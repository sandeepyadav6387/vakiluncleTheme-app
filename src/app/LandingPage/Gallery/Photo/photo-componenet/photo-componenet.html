<!-- Banner -->

<section class="bg-[#f5f1eb] py-3 border-b border-gray-200 relative">

  <div class="max-w-7xl mx-auto px-4 text-center relative">

    <div class="absolute left-10 top-0 hidden lg:block">
      <i class="pi pi-sparkles banner-icon"></i>
    </div>

    <h1 class="font-serif text-4xl lg:text-6xl text-[#1c2434] mb-4">
      Photo Gallery
    </h1>

    
  </div>

</section>

<section class="gallery-section">

  <div class="gallery-grid">

    @for(photo of photos; track photo){

      <div class="gallery-item">
        <img [src]="photo" alt="Gallery Image">
      </div>

    }

  </div>

</section>
