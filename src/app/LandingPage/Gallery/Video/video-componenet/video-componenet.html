<!-- Banner -->

<section class="bg-[#f5f1eb] py-3 border-b border-gray-200 relative">

  <div class="max-w-7xl mx-auto px-4 text-center relative">

    <div class="absolute left-10 top-0 hidden lg:block">
      <i class="pi pi-sparkles banner-icon"></i>
    </div>

    <h1 class="font-serif text-4xl lg:text-6xl text-[#1c2434] mb-4">
      Video Gallery
    </h1>

    
  </div>

</section>
<!-- Videos -->

<section class="video-section">

  <div class="video-grid">

    @for(video of videos; track video){

      <a
        [href]="video.url"
        target="_blank"
        class="video-card">

        <img
          [src]="video.thumbnail"
          alt="Video Thumbnail">

        <div class="play-btn">
          <i class="pi pi-play"></i>
        </div>

      </a>

    }

  </div>

</section>

<!-- CTA -->

<section class="cta-section">

  <div class="cta-content">

    <h2>
      Secure Your Defense:<br>
      Schedule a Free<br>
      Consultation Today
    </h2>

    <p>
      This CTA title invites readers to take action &
      seek the assistance corporate lawyer.
    </p>

    <div class="cta-form">

      <input
        type="email"
        placeholder="Enter Your Email">

      <button>
        Schedule a Consultation
        <i class="pi pi-arrow-up-right"></i>
      </button>

    </div>

  </div>

</section>
