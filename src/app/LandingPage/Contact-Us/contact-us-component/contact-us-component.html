<!-- Banner -->
<section
  class="bg-[#f5f1eb] border-b border-gray-200 py-20 text-center">

  <div class="max-w-3xl mx-auto px-4">

    <h1
      class="font-serif text-4xl lg:text-6xl text-[#1c2434] mb-5">
      Contact Us
    </h1>

    <div
      class="flex justify-center items-center gap-2 text-sm">

      <span>Home</span>

      <i class="pi pi-angle-right"></i>

      <span class="font-semibold">
        Contact Us
      </span>

    </div>

  </div>

</section>

<!-- Contact Form -->

<section class="bg-[#f7f7f7] py-20 lg:py-12">

  <div class="max-w-3xl mx-auto px-4">

    <div
      class="bg-white rounded-lg shadow-sm p-8 lg:p-12 border border-gray-100">

      <form
        [formGroup]="contactForm"
        (ngSubmit)="submitForm()">

        <div class="grid md:grid-cols-2 gap-6">

          <!-- First Name -->
          <div>

            <label class="contact-label">
              First Name*
            </label>

            <input
              pInputText
              formControlName="firstName"
              placeholder="First Name"
              class="w-full">

          </div>

          <!-- Last Name -->
          <div>

            <label class="contact-label">
              Last Name*
            </label>

            <input
              pInputText
              formControlName="lastName"
              placeholder="Last Name"
              class="w-full">

          </div>

          <!-- Email -->
          <div>

            <label class="contact-label">
              Email Address*
            </label>

            <input
              pInputText
              formControlName="email"
              placeholder="Email Address"
              class="w-full">

          </div>

          <!-- Phone -->
          <div>

            <label class="contact-label">
              Phone Number*
            </label>

            <input
              pInputText
              formControlName="phone"
              placeholder="Phone Number"
              class="w-full">

          </div>

        </div>

        <!-- Message -->

        <div class="mt-6">

          <label class="contact-label">
            Message*
          </label>

          <textarea
            pInputTextarea
            rows="6"
            formControlName="message"
            placeholder="Type your message..."
            class="w-full">
          </textarea>

        </div>

        <!-- Button -->

        <div class="mt-8">

          <button
            pButton
            type="submit"
            label="Send Now"
            class="contact-btn">
          </button>

        </div>

      </form>

    </div>

  </div>

</section>
