<!-- Banner -->

<section class="bg-[#f5f1eb] py-3 border-b border-gray-200 relative">

  <div class="max-w-7xl mx-auto px-4 text-center relative">

    <div class="absolute left-10 top-0 hidden lg:block">
      <i class="pi pi-sparkles banner-icon"></i>
    </div>

    <h1 class="font-serif text-4xl lg:text-6xl text-[#1c2434] mb-4">
      Contact Us
    </h1>

    
  </div>

</section>

<!-- Contact Form -->

<section class="bg-[#f7f7f7] py-10 lg:py-12">

  <div class="max-w-3xl mx-auto px-4">

    <div
      class="bg-white rounded-lg shadow-sm p-8 lg:p-12 border border-gray-100">

      <form
        [formGroup]="contactForm"
        (ngSubmit)="submitForm()">

        <div class="grid md:grid-cols-2 gap-6">

          <!-- First Name -->
          <div>

            <label class="contact-label">
              First Name*
            </label>

            <input
              pInputText
              formControlName="firstName"
              placeholder="First Name"
              class="w-full">

          </div>

          <!-- Last Name -->
          <div>

            <label class="contact-label">
              Last Name*
            </label>

            <input
              pInputText
              formControlName="lastName"
              placeholder="Last Name"
              class="w-full">

          </div>

          <!-- Email -->
          <div>

            <label class="contact-label">
              Email Address*
            </label>

            <input
              pInputText
              formControlName="email"
              placeholder="Email Address"
              class="w-full">

          </div>

          <!-- Phone -->
          <div>

            <label class="contact-label">
              Phone Number*
            </label>

            <input
              pInputText
              formControlName="phone"
              placeholder="Phone Number"
              class="w-full">

          </div>

        </div>

        <!-- Message -->

        <div class="mt-6">

          <label class="contact-label">
            Message*
          </label>

          <textarea
            pInputTextarea
            rows="6"
            formControlName="message"
            placeholder="Type your message..."
            class="w-full">
          </textarea>

        </div>

        <!-- Button -->

        <div class="mt-8">

          <button
            pButton
            type="submit"
            label="Send Now"
            class="contact-btn">
          </button>

        </div>

      </form>

    </div>

  </div>

</section>
