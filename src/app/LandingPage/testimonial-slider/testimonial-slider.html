<section class="bg-[#f7f7f7] py-20">

  <div class="max-w-7xl mx-auto px-4">

    <!-- Section Heading -->

    <div class="mb-12 max-w-[700px]">

      <span
        class="inline-block px-5 py-2 border border-gray-300 rounded-full text-sm text-[#1c2434]">
        Testimonials
      </span>

    </div>

    <p-carousel
      [value]="testimonials"
      [numVisible]="3"
      [numScroll]="1"
      [circular]="true"
      [autoplayInterval]="3000"
      [showIndicators]="true"
      [showNavigators]="false"
      [responsiveOptions]="iresponsiveOptions">

      <ng-template let-item pTemplate="item">

        <div class="testimonial-card mx-3">

          <div class="flex items-center gap-4 mb-6">

            <div class="relative">

              <img
                [src]="item.image"
                class="w-14 h-14 rounded-full object-cover">

              <div class="quote-icon">
                <i class="pi pi-quote-right"></i>
              </div>

            </div>

            <div>

              <h4 class="font-serif text-[28px] text-[#1c2434]">
                {{item.name}}
              </h4>

              <p class="text-gray-500 text-sm">
                {{item.company}}
              </p>

            </div>

          </div>

          <p class="review-text">
            "{{item.review}}"
          </p>

        </div>

      </ng-template>

    </p-carousel>

  </div>

</section>
