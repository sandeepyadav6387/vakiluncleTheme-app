<!-- Banner -->

<section class="bg-[#f5f1eb] py-3 border-b border-gray-200 relative">

  <div class="max-w-7xl mx-auto px-4 text-center relative">

    <div class="absolute left-10 top-0 hidden lg:block">
      <i class="pi pi-sparkles banner-icon"></i>
    </div>

    <h1 class="font-serif text-4xl lg:text-6xl text-[#1c2434] mb-4">
      Our Team
    </h1>

    
  </div>

</section>

<!-- Team Section -->
<section class="bg-[#f3f3f3] py-10">

  <div class="max-w-7xl mx-auto px-4">

    <div
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

      @for(member of teamMembers; track member.name){

      <div class="team-card bg-white">

        <!-- Image -->
        <div class="image-wrapper">

          <img
            [src]="member.image"
            [alt]="member.name"
            class="w-full h-[280px] object-cover">

        </div>

        <!-- Orange Line -->
        <div class="h-[4px] bg-[#f7941d]"></div>

        <!-- Content -->
        <div class="p-5 text-center">

          <h3
            class="font-serif text-[28px] leading-tight text-[#1c2434] mb-2">
            {{ member.name }}
          </h3>

          <p class="text-gray-500 text-sm mb-5">
            {{ member.role }}
          </p>

          <!-- Social -->
          <div class="flex justify-center gap-3">

            <a class="social-icon">
              <i class="pi pi-times"></i>
            </a>

            <a class="social-icon">
              <i class="pi pi-facebook"></i>
            </a>

            <a class="social-icon">
              <i class="pi pi-instagram"></i>
            </a>

            <a class="social-icon">
              <i class="pi pi-linkedin"></i>
            </a>

          </div>

        </div>

      </div>

      }

    </div>

  </div>

</section>
