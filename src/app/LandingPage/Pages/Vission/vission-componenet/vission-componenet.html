<!-- Banner -->
<section class="bg-[#f5f1eb] py-3 border-b border-gray-200 relative">

  <div class="max-w-7xl mx-auto px-4 text-center relative">

    <div class="absolute left-10 top-0 hidden lg:block">
      <i class="pi pi-sparkles banner-icon" ></i>
    </div>

    <h1 class="font-serif text-4xl lg:text-6xl text-[#1c2434] mb-4">
      Vision & Mission
    </h1>

    
  </div>

</section>

<!-- Dynamic Sections -->

<section class="bg-[#f7f7f7] py-10">

  <div class="max-w-6xl mx-auto px-4">

    @for(section of sections; track section.title){

    <div
      class="grid lg:grid-cols-2 gap-12 items-center mb-24">

      <!-- Image Left -->
      @if(section.imageLeft){

      <div class="image-box overflow-hidden rounded-3xl">
        <img
          [src]="section.image"
          [alt]="section.title"
          class="w-full h-[420px] object-cover">
      </div>

      <div>
        <h2 class="text-4xl font-serif text-[#1c2434] mb-6">
          {{section.title}}
        </h2>

        @for(text of section.paragraphs; track $index){
        <p class="content-text mb-6">
          {{text}}
        </p>
        }

      </div>

      }

      <!-- Image Right -->
      @else {

      <div>
        <h2 class="text-4xl font-serif text-[#1c2434] mb-6">
          {{section.title}}
        </h2>

        @for(text of section.paragraphs; track $index){
        <p class="content-text mb-6">
          {{text}}
        </p>
        }

      </div>

      <div class="image-box overflow-hidden rounded-3xl">
        <img
          [src]="section.image"
          [alt]="section.title"
          class="w-full h-[420px] object-cover">
      </div>

      }

    </div>

    }

  </div>

</section>
