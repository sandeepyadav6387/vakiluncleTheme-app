<!-- Banner -->

<section class="bg-[#f5f1eb] py-3 border-b border-gray-200 relative">

  <div class="max-w-7xl mx-auto px-4 text-center relative">

    <div class="absolute left-10 top-0 hidden lg:block">
      <i class="pi pi-sparkles banner-icon"></i>
    </div>

    <h1 class="font-serif text-4xl lg:text-6xl text-[#1c2434] mb-4">
      Practice Area
    </h1>

    
  </div>

</section>
<section class="bg-[#f7f7f7] py-20 lg:py-10 ">

  <div class="max-w-7xl mx-auto px-4">

    <!-- Header -->
    <div class="text-center mb-16">

      

      <h2
        class="text-3xl md:text-4xl lg:text-5xl font-serif text-[#141b2d] max-w-3xl mx-auto leading-tight">
        Expert Criminal Defense Attorneys Fighting For Your Rights
      </h2>

    </div>

    <!-- Cards -->
    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      @for(area of practiceAreas; track area.title){

      <div
        class="practice-card bg-white rounded-2xl border border-gray-200 p-10 text-center">

        <div
          class="w-[75px] h-[75px] mx-auto mb-6 rounded-full bg-orange-50 flex items-center justify-center">

          <i
            [class]="area.icon"
            class="text-3xl text-orange-500">
          </i>

        </div>

        <h3
          class="text-2xl lg:text-3xl font-semibold text-[#141b2d] mb-5">
          {{ area.title }}
        </h3>

        <p
          class="text-gray-600 leading-8 mb-6">
          {{ area.description }}
        </p>

        <a
          href="#"
          class="font-semibold text-[#141b2d] hover:text-orange-500 transition">
          Learn More ↗
        </a>

      </div>

      }

    </div>

    <!-- Button -->
    <div class="text-center mt-16">

      <button
        pButton
        type="button"
        label="Discover Our Practice Areas"
        icon="pi pi-arrow-up-right"
        iconPos="right"
        class="practice-btn">
      </button>

    </div>

  </div>

</section>
